name: Refresh README

on:
  schedule:
    - cron: "17 14 * * 1" # Mondays 14:17 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/refresh-readme.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Commit if changed
        run: |
          git config user.name "readme-bot"
          git config user.email "actions@github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "chore: refresh README live strips"
          git push
